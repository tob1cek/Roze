<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roze</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px;
}

img{
    max-width:250px;
    border-radius:12px;
    margin-top:10px;
}

.photo{
    margin:20px 0;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
}

input[type="text"]{
    width:90%;
    padding:8px;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>🌹 Roze</h1>

<input type="file" id="upload" accept="image/*">
<br><br>
<input type="text" id="caption" placeholder="Napiš popisek...">
<br><br>
<button onclick="savePhoto()">Přidat</button>

<div id="gallery"></div>

<script>
let photos = JSON.parse(localStorage.getItem("rozePhotos")) || [];

function renderGallery(){
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    photos.forEach(photo => {
        const div = document.createElement("div");
        div.className = "photo";

        div.innerHTML = `
            <img src="${photo.image}">
            <p>${photo.caption}</p>
        `;

        gallery.appendChild(div);
    });
}

function savePhoto(){
    const file = document.getElementById("upload").files[0];
    const caption = document.getElementById("caption").value;

    if(!file) return alert("Vyber fotku");

    const reader = new FileReader();

    reader.onload = function(e){
        photos.push({
            image: e.target.result,
            caption: caption
        });

        localStorage.setItem(
            "rozePhotos",
            JSON.stringify(photos)
        );

        renderGallery();
    };

    reader.readAsDataURL(file);
}

renderGallery();
</script>

</body>
</html>
